<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeJob AI - Admin Dashboard</title>
    <!-- Use TailwindCSS via CDN for Rapid Premium UI Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#4f46e5', // Sleek Indigo
                        danger: '#ef4444',
                        success: '#10b981',
                        surface: '#18181b', // Dark surface
                        background: '#09090b', // Deep dark mode
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; }
        /* Premium Glow Effect on Cards */
        .glass-card {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
        }
        /* Custom Scrollbar for the data table */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    </style>
</head>
<body class="antialiased min-h-screen pb-12">

    <!-- Header Navigation -->
    <nav class="border-b border-white/10 bg-surface/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-primary to-purple-500 flex items-center justify-center font-bold text-white shadow-lg shadow-primary/30">
                        SJ
                    </div>
                    <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                        Admin Intelligence
                    </span>
                </div>
                <div class="flex gap-4">
                    <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-white transition-colors py-2">Back to Public Site</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
        
        <!-- Header Section -->
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Status Overview</h1>
                <p class="text-gray-400 mt-1">Live metrics from your SafeJob AI MySQL Engine.</p>
            </div>
            <button onclick="fetchDashboardData()" class="px-5 py-2.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 group">
                <svg class="w-4 h-4 text-gray-400 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh Data
            </button>
        </div>

        <!-- 3-Column Metrics Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12" id="stats-container">
            <!-- Loading states injected via JS -->
            <div class="glass-card p-6 animate-pulse hidden" id="stats-loader">
                <div class="h-4 bg-white/10 rounded w-1/3 mb-4"></div>
                <div class="h-10 bg-white/10 rounded w-1/2"></div>
            </div>
        </div>

        <!-- Master Data Logs -->
        <h2 class="text-xl font-bold mb-4 tracking-tight">Recent Threat Scans (Top 50)</h2>
        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-white/10">
                    <thead class="bg-white/5">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">ID / Date</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Risk Level</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Telemetry (IP)</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Job Text Excerpt</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Keywords Triggered</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-300 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5 bg-transparent" id="table-body">
                        <!-- Populated by admin.js -->
                        <tr><td colspan="6" class="px-6 py-12 text-center text-gray-500 text-sm">Fetching intelligence logs from MySQL...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </main>

    <script src="admin.js"></script>
</body>
</html>
